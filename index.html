<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Life Changers Awards - Tombola</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Bebas+Neue&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>
<canvas id="bg-canvas"></canvas>
<div class="rays"></div>
<div class="vignette"></div>
<div id="winner-flash"></div>

<div class="wrapper">
  <div class="header">
    <div class="logo-wrapper">
      <div class="logo-glow-ring"></div>
      <div class="logo-glow-ring logo-glow-ring2"></div>
      <div class="logo-shine"></div>
        <img src="img/Groupe 2.png" alt="Life Changers Awards Logo" class="logo">
    </div>
    <div class="theme-badge">✦ L'excellence comme héritage ✦</div>
  </div>

  <div class="divider"></div>

  <div class="counter-bar">
    <div class="counter-chip">Total : <span>850</span></div>
    <div class="counter-chip">Restants : <span id="restants">850</span></div>
    <div class="counter-chip">Tirés : <span id="tires">0</span></div>
    <div class="counter-chip music-btn" id="musicBtn" onclick="toggleBgMusic()" title="Musique de fond">
      🎵 <span id="musicLabel">Musique OFF</span>
    </div>
  </div>

  <div class="drum-container">
    <div class="drum-outer">
      <div class="drum-label">★ Tombola Officielle ★</div>

      <div class="number-display">
        <div class="number-ring"></div>
        <div class="number-ring2"></div>
        <div id="numero">?</div>
      </div>

      <button class="btn-tirage" id="btnTirage" onclick="startTirage()">
        🎰 &nbsp;TIRER UN NUMÉRO
      </button>
    </div>
  </div>

  <div class="winners-section">
    <div class="section-title">Tableau des Gagnants</div>
    <ul id="liste"></ul>
    <button class="btn-reset" onclick="resetTirage()">↺ Réinitialiser la tombola</button>
  </div>
</div>
